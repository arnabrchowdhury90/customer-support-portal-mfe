<div class="ticket-details" *ngIf="ticket() as ticket">

    <div class="ticket-header">

        <div>

            <span class="eyebrow">
                ENTERPRISE SUPPORT
            </span>

            <h1>{{ ticket.subject }}</h1>

            <p class="ticket-id">
                {{ ticket.id }}
            </p>

        </div>

        <button
            pButton
            icon="pi pi-sparkles"
            label="Analyze with AI"
            (click)="analyzeTicket()">
        </button>

    </div>

    <p-card>

        <div class="ticket-info">

            <div class="info-card">

                <span>Customer</span>

                <h3>{{ ticket.customer }}</h3>

            </div>

            <div class="info-card">

                <span>Status</span>

                <p-tag
                    [value]="ticket.status"
                    [severity]="
                        ticket.status === 'Open'
                            ? 'danger'
                            : ticket.status === 'In Progress'
                            ? 'warn'
                            : 'success'
                    ">
                </p-tag>

            </div>

            <div class="info-card">

                <span>Priority</span>

                <p-tag
                    [value]="ticket.priority"
                    [severity]="
                        ticket.priority === 'High'
                            ? 'danger'
                            : ticket.priority === 'Medium'
                            ? 'warn'
                            : 'info'
                    ">
                </p-tag>

            </div>

            <div class="info-card">

                <span>Assignee</span>

                <h3>{{ ticket.assignee }}</h3>

            </div>

        </div>

        <div class="description-card">

            <h3>Description</h3>

            <p>{{ ticket.description }}</p>

        </div>

<div
    class="agent-panel"
    *ngIf="isAnalyzing()">

    <div class="agent-top">

        <div>

            <div class="agent-title">

                🤖 Enterprise AI Agent

            </div>

            <div class="agent-subtitle">

                Executing autonomous workflow...

            </div>

        </div>

        <i
            class="pi pi-spin pi-spinner"
            style="font-size:2rem;color:#60a5fa;">
        </i>

    </div>

    <div class="section">

        <h3>Execution Progress</h3>

        <div
            class="step"
            *ngFor="let step of executionSteps()">

            <span class="step-icon">✓</span>

            <span>{{ step }}</span>

        </div>

    </div>

</div>

    </p-card>

</div>
