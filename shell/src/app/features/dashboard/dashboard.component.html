<section class="dashboard">
  <p-card class="dashboard__hero">
    <div class="dashboard__hero-row">
      <div>
        <p class="dashboard__eyebrow">Welcome back</p>
        <h1>Welcome back, {{ authService.user()?.name }}! 👋</h1>
        <p class="dashboard__copy">Customer Support Portal</p>
        <p class="dashboard__subcopy">
          Manage tickets, customers, analytics, and admin tasks from one place.
        </p>
      </div>

      <!-- Role badge on the right -->
      <p-tag
        *ngIf="authService.user() as user"
        [value]="user.role | titlecase"
        severity="info"
      ></p-tag>
    </div>

    <!-- Signed-in user summary -->
    <div class="dashboard__user" *ngIf="authService.user() as user">
      <div class="dashboard__user-icon">
        <i class="pi pi-user"></i>
      </div>

      <div class="dashboard__user-copy">
        <span class="dashboard__label">Signed in as</span>
        <strong>{{ user.name }}</strong>
        <small>{{ user.email }}</small>
      </div>
    </div>
  </p-card>

  <div class="dashboard__stats">
    <p-card class="dashboard__stat" *ngFor="let stat of stats">
      <div class="dashboard__stat-row">
        <div class="dashboard__stat-icon" [ngClass]="'is-' + stat.accent">
          <i [class]="stat.icon"></i>
        </div>

        <div class="dashboard__stat-copy">
          <span class="dashboard__stat-label">{{ stat.label }}</span>
          <strong class="dashboard__stat-value" [ngClass]="'is-' + stat.accent">
            {{ stat.value }}
          </strong>
          <small>{{ stat.note }}</small>
        </div>
      </div>
    </p-card>
  </div>

  <div class="dashboard__grid">
    <p-card header="Quick actions" class="dashboard__panel">
      <div class="dashboard__actions">
        <ng-container *ngFor="let action of actions">
          <!-- Permission gate keeps the action list clean -->
          <a
            pButton
            [routerLink]="action.route"
            [outlined]="true"
            [label]="action.label"
            [icon]="action.icon"
            class="dashboard__action"
            *appHasPermission="action.permission"
          ></a>
        </ng-container>
      </div>
    </p-card>

    <p-card header="Your access" class="dashboard__panel">
      <div class="dashboard__scopes" *ngIf="authService.user() as user">
        <p-tag *ngFor="let scope of user.scopes" [value]="scope"></p-tag>
      </div>
    </p-card>
  </div>
</section>
